<?xml version="1.0" encoding="UTF-8"?>
<svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- UTCLogo SVG - Học viện Kỹ thuật Mật mã -->
  
  <!-- Background Circle -->
  <circle cx="18" cy="18" r="17" fill="url(#gradient)" stroke="#000" stroke-width="0.5"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Letter K -->
  <g transform="translate(8, 8) scale(2.5)">
    <!-- Vertical bar of K -->
    <rect x="1" y="0.5" width="0.8" height="5" fill="white" rx="0.3"/>
    
    <!-- Top diagonal of K -->
    <line x1="1.8" y1="0.5" x2="3.5" y2="2.5" stroke="white" stroke-width="0.8" stroke-linecap="round"/>
    
    <!-- Bottom diagonal of K -->
    <line x1="1.8" y1="5.5" x2="3.5" y2="3.5" stroke="white" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  
  <!-- Optional: Decorative elements -->
  <circle cx="28" cy="10" r="2" fill="#00d4ff" opacity="0.6"/>
  <circle cx="10" cy="28" r="1.5" fill="#7c3aed" opacity="0.6"/>
</svg>
